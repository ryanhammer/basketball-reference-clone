name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    # Only run for the repo owner to prevent untrusted users from triggering
    # write-access jobs or exfiltrating secrets via @claude mentions.
    if: |
      github.event.sender.login == github.repository_owner &&
      ((github.event_name == 'issue_comment' && contains(github.event.comment.body || '', '@claude')) ||
       (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body || '', '@claude')) ||
       (github.event_name == 'pull_request_review' && contains(github.event.review.body || '', '@claude')) ||
       (github.event_name == 'issues' && (contains(github.event.issue.body || '', '@claude') || contains(github.event.issue.title || '', '@claude'))))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        # Pinned to v1.0.136 (0b1b620) — update intentionally when upgrading
        uses: anthropics/claude-code-action@0b1b62002952733671bde978d429b50b51c51c85
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
